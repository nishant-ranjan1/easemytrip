name: CI Pipeline
on:
  push:
    branches:
      - master
  pull_request:

env:
  APP_NAME: easemytrip
  VERSION: 1.1.${{ github.run_number }}
  IMAGE_TAG: ${{ github.run_number }}
  IMAGE_LOCAL: easemytrip:${{ github.run_number }}
  IMAGE_LOCAL_LATEST: easemytrip:latest
  IMAGE_DOCKERHUB: nishantr/easemytrip:${{ github.run_number }}
  IMAGE_DOCKERHUB_LATEST: nishantr/easemytrip:latest
  IMAGE_ECR: 306989527369.dkr.ecr.ap-south-1.amazonaws.com/demodockerrepo1:${{ github.run_number }}
  IMAGE_ECR_LATEST: 306989527369.dkr.ecr.ap-south-1.amazonaws.com/demodockerrepo1:latest

jobs:
  build-test:
    name: Compile, Test & Package
    # MODIFIED: Changed from ubuntu-latest to self-hosted
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          # Note: On self-hosted, Maven usually uses the local ~/.m2 directory
          # which persists between runs automatically.
          cache: 'maven'

      - name: Package Artifact
        run: mvn package -DskipTests

      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar

  docker-build-scan-push:
    name: Docker Build, Scan & Push to ECR
    # MODIFIED: Changed from ubuntu-latest to self-hosted
    runs-on: self-hosted
    needs: build-test

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download JAR Artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target/

      - name: Build Docker Image
        run: |
          docker build -t $IMAGE_LOCAL .
          docker tag $IMAGE_LOCAL $IMAGE_LOCAL_LATEST
          docker tag $IMAGE_LOCAL $IMAGE_DOCKERHUB
          docker tag $IMAGE_LOCAL $IMAGE_DOCKERHUB_LATEST
          docker tag $IMAGE_LOCAL $IMAGE_ECR
          docker tag $IMAGE_LOCAL $IMAGE_ECR_LATEST

      - name: Scan Docker Image with Trivy
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: ${{ env.IMAGE_LOCAL }}
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Push to Docker Hub and ECR
        run: |
          docker push $IMAGE_DOCKERHUB
          docker push $IMAGE_DOCKERHUB_LATEST
          docker push $IMAGE_ECR
          docker push $IMAGE_ECR_LATEST
